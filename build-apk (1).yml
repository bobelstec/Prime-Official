name: Build APK PRIME+

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite rodar manualmente pelo botão "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Gerar keystore de debug (usada para assinar o release)
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Compilar o APK
        run: gradle assembleRelease --no-daemon

      - name: Publicar o APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
