plugins {
    id 'com.android.application'
}

android {
    namespace 'com.prime.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.prime.app"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            // APK de release assinado com a chave de debug para facilitar a
            // distribuição direta (link/WhatsApp). Para publicar na Play Store
            // no futuro, troca-se por uma keystore própria.
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.10.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
